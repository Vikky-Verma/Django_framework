{% extends "layout.html" %}

{% block title %}
   Chai Page
{% endblock %}

{% block content %}
    <h1> All Chai for you </h1>

    <div class = "grid grid-cols-3 gap-4 m-4">

       {% for chai in chais %}
         <div class= "bg-blue-500  p-5">
             <img class = "rounded shadow-lg" src="{{ chai.image.url }}" alt="">
             <h3 class = "text-lg font-bold">{{ chai.name }}</h3>
             <a href="{% url 'chai_detail' chai.id %}" > 
                <button
                type="button"
                class="inline-flex items-center w-[100%] justify-center px-4 py-2 bg-orange-600 text-white hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:ring-offset-2" > 
                  {{ chai.type }} -{{chai.id}}
                </button>
             </a>
         </div>
      {% endfor %}

    </div>
    
{% endblock %}
